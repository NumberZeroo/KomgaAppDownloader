name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze di sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev python3-pip \
            build-essential ccache

      - name: Installa buildozer
        run: |
          pip install buildozer==1.4.0 cython==0.29.33 virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-${{ runner.os }}
          restore-keys: |
            buildozer-${{ runner.os }}

      - name: Sincronizza versione dal tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          sed -i "s/^version = .*/version = $TAG/" buildozer.spec
          sed -i "s/^VERSION = .*/VERSION = \"$TAG\"/" main.py

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Ottieni nome tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Pubblica GitHub Release con APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Komga Downloader ${{ steps.tag.outputs.TAG }}"
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}