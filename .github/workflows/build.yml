name: Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Questa è la parte che risolve l'errore del log: forza Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Installa dipendenze di sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev python3-pip \
            build-essential ccache

      - name: Installa buildozer
        run: |
          pip install buildozer==1.4.0 cython==0.29.33 virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-${{ runner.os }}
          restore-keys: |
            buildozer-${{ runner.os }}

      - name: Sincronizza versione dal tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          sed -i "s/^version = .*/version = $TAG/" buildozer.spec
          # Aggiorna VERSION nel main.py solo se esiste
          sed -i "s/^VERSION = .*/VERSION = \"$TAG\"/" main.py || true

      - name: Build APK
        run: |
          # 1. Pulizia preventiva: evita che vecchi APK finiscano nella release
          rm -rf bin/*.apk
          
          # NON forzare ANDROID_SDK_ROOT o NDK qui. 
          # Buildozer userà i percorsi di default in ~/.buildozer
          yes | buildozer -v android debug

      - name: Pubblica GitHub Release con APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Prende il tag direttamente dal trigger
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}